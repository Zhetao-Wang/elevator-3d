<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 电梯配置器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "PingFang SC", -apple-system, BlinkMacSystemFont, sans-serif;
            background: #1a1a1a;
            overflow: hidden;
        }

        /* 视图容器 */
        .view-container {
            width: 100vw;
            height: 100vh;
            display: none;
        }

        .view-container.active {
            display: block;
        }

        /* 切换按钮组 */
        #view-switcher {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            background: rgba(0,0,0,0.7);
            border-radius: 8px;
            padding: 4px;
            z-index: 100;
        }

        .view-btn {
            padding: 10px 24px;
            background: transparent;
            color: #aaa;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .view-btn:hover {
            color: #fff;
        }

        .view-btn.active {
            background: #007aff;
            color: #fff;
        }

        /* 右侧面板 */
        .config-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 280px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            display: none;
        }

        .config-panel.active {
            display: block;
        }

        .config-panel h3 {
            margin: 0 0 15px 0;
            font-size: 16px;
            color: #333;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .config-section {
            margin-bottom: 15px;
        }

        .config-section label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 600;
        }

        /* 材质卡片网格 */
        .material-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .material-card {
            aspect-ratio: 1;
            border-radius: 8px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .material-card:hover {
            transform: scale(1.05);
        }

        .material-card.active {
            border-color: #007aff;
            box-shadow: 0 0 0 2px rgba(0,122,255,0.3);
        }

        /* 型号选择按钮 */
        .model-buttons {
            display: flex;
            gap: 8px;
        }

        .model-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .model-btn:hover {
            background: #f5f5f5;
        }

        .model-btn.active {
            background: #007aff;
            color: #fff;
            border-color: #007aff;
        }

        /* 提示信息 */
        #hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            pointer-events: none;
        }

        /* 组件标题 */
        .component-title {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }

        .component-title.active {
            display: block;
        }
    </style>
</head>
<body>
    <!-- 视图切换按钮 -->
    <div id="view-switcher">
        <button class="view-btn active" data-view="door">层门配置</button>
        <button class="view-btn" data-view="cabin">轿厢配置</button>
    </div>

    <!-- 界面1: 门配置器 -->
    <div id="door-view" class="view-container active">
        <div id="door-canvas-container" style="width: 100%; height: 100%;"></div>
        <div id="door-component-title" class="component-title">点击选择组件</div>
        <div id="door-config-panel" class="config-panel">
            <h3 id="door-panel-title">配置</h3>
            <div class="config-section" id="door-material-section">
                <label>材质选择</label>
                <div class="material-grid" id="door-material-grid"></div>
            </div>
            <div class="config-section" id="door-model-section" style="display: none;">
                <label>型号选择</label>
                <div class="model-buttons" id="door-model-buttons"></div>
            </div>
            <div class="config-section" id="door-button-model-section" style="display: none;">
                <label>按钮型号</label>
                <div class="model-buttons" id="door-button-model-buttons"></div>
            </div>
            <div class="config-section" id="door-button-color-section" style="display: none;">
                <label>按钮颜色</label>
                <div class="model-buttons" id="door-button-color-buttons"></div>
            </div>
            <div class="config-section" id="door-display-model-section" style="display: none;">
                <label>显示器型号</label>
                <div class="model-buttons" id="door-display-model-buttons"></div>
            </div>
        </div>
    </div>

    <!-- 界面2: 轿厢配置器 -->
    <div id="cabin-view" class="view-container">
        <div id="cabin-canvas-container" style="width: 100%; height: 100%;"></div>
        <div id="cabin-component-title" class="component-title">点击选择组件</div>
        <div id="cabin-config-panel" class="config-panel">
            <h3 id="cabin-panel-title">配置</h3>
            <div class="config-section" id="cabin-material-section">
                <label>材质选择</label>
                <div class="material-grid" id="cabin-material-grid"></div>
            </div>
            <div class="config-section" id="cabin-button-color-section" style="display: none;">
                <label>按钮颜色</label>
                <div class="model-buttons" id="cabin-button-color-buttons"></div>
            </div>
            <div class="config-section" id="cabin-panel-color-section" style="display: none;">
                <label>面板颜色</label>
                <div class="model-buttons" id="cabin-panel-color-buttons"></div>
            </div>
            <div class="config-section" id="cabin-screen-type-section" style="display: none;">
                <label>屏幕类型</label>
                <div class="model-buttons" id="cabin-screen-type-buttons"></div>
            </div>
        </div>
    </div>

    <!-- 操作提示 -->
    <div id="hint">🖱️ 点击组件进行配置 | 拖拽旋转 | 滚轮缩放</div>

    <script type="module">
        import { DoorConfigurator } from '/src/door-configurator.js';
        import { CabinConfigurator } from '/src/cabin-configurator.js';
        import configData from '/config-data.json';

        // EventBus 实现
        class EventBus {
            constructor() {
                this.events = {};
            }
            on(event, callback) {
                if (!this.events[event]) this.events[event] = [];
                this.events[event].push(callback);
            }
            emit(event, data) {
                if (!this.events[event]) return;
                this.events[event].forEach(cb => cb(data));
            }
        }
        window.EventBus = new EventBus();

        // 材质颜色映射
        const materialColors = {
            'st-hairline': '#aaaaaa',
            'st-mirror': '#cccccc',
            'ti-hairline': '#c5a059',
            'ti-mirror': '#d4af37',
            'bk-hairline': '#222222',
            'bk-mirror': '#333333'
        };

        let doorConfigurator, cabinConfigurator;
        let currentView = 'door';

        // 初始化门配置器
        async function initDoorConfigurator() {
            const container = document.getElementById('door-canvas-container');
            doorConfigurator = new DoorConfigurator(container);
            await doorConfigurator.initialize(configData);
            setupDoorUI();
        }

        // 初始化轿厢配置器
        async function initCabinConfigurator() {
            const container = document.getElementById('cabin-canvas-container');
            cabinConfigurator = new CabinConfigurator(container);
            await cabinConfigurator.initialize(configData);
            setupCabinUI();
        }

        // 门配置器 UI
        function setupDoorUI() {
            const panel = document.getElementById('door-config-panel');
            const panelTitle = document.getElementById('door-panel-title');
            const componentTitle = document.getElementById('door-component-title');
            const materialGrid = document.getElementById('door-material-grid');
            const modelSection = document.getElementById('door-model-section');
            const modelButtons = document.getElementById('door-model-buttons');
            const buttonModelSection = document.getElementById('door-button-model-section');
            const buttonModelButtons = document.getElementById('door-button-model-buttons');
            const buttonColorSection = document.getElementById('door-button-color-section');
            const buttonColorButtons = document.getElementById('door-button-color-buttons');
            const displayModelSection = document.getElementById('door-display-model-section');
            const displayModelButtons = document.getElementById('door-display-model-buttons');

            let currentComponent = null;

            window.EventBus.on('component:selected', (data) => {
                if (currentView !== 'door') return;
                currentComponent = data.component;

                componentTitle.textContent = data.component.name;
                componentTitle.classList.add('active');

                panelTitle.textContent = `${data.component.name} 配置`;
                panel.classList.add('active');

                if (data.configurable.includes('material')) {
                    renderMaterialOptions(data.component, materialGrid);
                    materialGrid.parentElement.style.display = 'block';
                } else {
                    materialGrid.parentElement.style.display = 'none';
                }

                if (data.configurable.includes('model')) {
                    renderModelOptions(data.component, modelButtons);
                    modelSection.style.display = 'block';
                } else {
                    modelSection.style.display = 'none';
                }

                if (data.configurable.includes('buttonModel')) {
                    renderButtonModelOptions(data.component, buttonModelButtons);
                    buttonModelSection.style.display = 'block';
                } else {
                    buttonModelSection.style.display = 'none';
                }

                if (data.configurable.includes('buttonColor')) {
                    renderButtonColorOptions(data.component, buttonColorButtons);
                    buttonColorSection.style.display = 'block';
                } else {
                    buttonColorSection.style.display = 'none';
                }

                if (data.configurable.includes('displayModel')) {
                    renderDisplayModelOptions(data.component, displayModelButtons);
                    displayModelSection.style.display = 'block';
                } else {
                    displayModelSection.style.display = 'none';
                }
            });
        }

        // 轿厢配置器 UI
        function setupCabinUI() {
            const panel = document.getElementById('cabin-config-panel');
            const panelTitle = document.getElementById('cabin-panel-title');
            const componentTitle = document.getElementById('cabin-component-title');
            const materialGrid = document.getElementById('cabin-material-grid');
            const buttonColorSection = document.getElementById('cabin-button-color-section');
            const buttonColorButtons = document.getElementById('cabin-button-color-buttons');
            const panelColorSection = document.getElementById('cabin-panel-color-section');
            const panelColorButtons = document.getElementById('cabin-panel-color-buttons');
            const screenTypeSection = document.getElementById('cabin-screen-type-section');
            const screenTypeButtons = document.getElementById('cabin-screen-type-buttons');

            let currentComponentKey = null;
            let currentComponent = null;

            window.EventBus.on('component:selected', (data) => {
                if (currentView !== 'cabin') return;
                currentComponentKey = data.configKey;
                currentComponent = data.component;

                componentTitle.textContent = data.component.name;
                componentTitle.classList.add('active');

                panelTitle.textContent = `${data.component.name} 配置`;
                panel.classList.add('active');

                // 材质选择
                if (data.configurable && data.configurable.includes('material')) {
                    renderCabinMaterialOptions(data.component, currentComponentKey, materialGrid);
                    materialGrid.parentElement.style.display = 'block';
                } else {
                    materialGrid.parentElement.style.display = 'none';
                }

                // 按钮颜色
                if (data.configurable && data.configurable.includes('buttonColor')) {
                    renderButtonColorOptions(data.component, currentComponentKey, buttonColorButtons);
                    buttonColorSection.style.display = 'block';
                } else {
                    buttonColorSection.style.display = 'none';
                }

                // 面板颜色
                if (data.configurable && data.configurable.includes('panelColor')) {
                    renderPanelColorOptions(data.component, currentComponentKey, panelColorButtons);
                    panelColorSection.style.display = 'block';
                } else {
                    panelColorSection.style.display = 'none';
                }

                // 屏幕类型
                if (data.configurable && data.configurable.includes('screenType')) {
                    renderScreenTypeOptions(data.component, currentComponentKey, screenTypeButtons);
                    screenTypeSection.style.display = 'block';
                } else {
                    screenTypeSection.style.display = 'none';
                }
            });

            window.EventBus.on('component:deselected', () => {
                if (currentView !== 'cabin') return;
                componentTitle.classList.remove('active');
                panel.classList.remove('active');
                currentComponentKey = null;
                currentComponent = null;
            });
        }

        // 渲染轿厢材质选项（支持分组同步）
        function renderCabinMaterialOptions(component, componentKey, materialGrid) {
            materialGrid.innerHTML = '';
            const materials = configData.materials;
            const currentConfig = component.getConfig ? component.getConfig() : {};

            Object.entries(materials).forEach(([key, mat]) => {
                const card = document.createElement('div');
                card.className = 'material-card';
                card.style.background = materialColors[key] || mat.color;
                card.textContent = mat.name;

                if (currentConfig.material === key) {
                    card.classList.add('active');
                }

                card.addEventListener('click', () => {
                    // 调用 cabinConfigurator.applyMaterial 以支持分组同步
                    cabinConfigurator.applyMaterial(componentKey, key);
                    materialGrid.querySelectorAll('.material-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                });

                materialGrid.appendChild(card);
            });
        }

        // 渲染按钮颜色选项
        function renderButtonColorOptions(component, componentKey, buttonContainer) {
            buttonContainer.innerHTML = '';
            if (!component.getButtonColorOptions) return;

            const options = component.getButtonColorOptions();
            const currentConfig = component.getConfig();

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'model-btn';
                btn.textContent = opt.name;
                if (currentConfig.buttonColor === opt.key) btn.classList.add('active');

                btn.addEventListener('click', () => {
                    cabinConfigurator.setButtonColor(componentKey, opt.key);
                    buttonContainer.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
                buttonContainer.appendChild(btn);
            });
        }

        // 渲染面板颜色选项
        function renderPanelColorOptions(component, componentKey, panelContainer) {
            panelContainer.innerHTML = '';
            if (!component.getPanelColorOptions) return;

            const options = component.getPanelColorOptions();
            const currentConfig = component.getConfig();

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'model-btn';
                btn.textContent = opt.name;
                if (currentConfig.panelColor === opt.key) btn.classList.add('active');

                btn.addEventListener('click', () => {
                    cabinConfigurator.setPanelColor(componentKey, opt.key);
                    panelContainer.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
                panelContainer.appendChild(btn);
            });
        }

        // 渲染屏幕类型选项
        function renderScreenTypeOptions(component, componentKey, screenContainer) {
            screenContainer.innerHTML = '';
            if (!component.getScreenTypeOptions) return;

            const options = component.getScreenTypeOptions();
            const currentConfig = component.getConfig();

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'model-btn';
                btn.textContent = opt.name;
                if (currentConfig.screenType === opt.key) btn.classList.add('active');

                btn.addEventListener('click', () => {
                    cabinConfigurator.setScreenType(componentKey, opt.key);
                    screenContainer.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
                screenContainer.appendChild(btn);
            });
        }

        // 渲染材质选项
        function renderMaterialOptions(component, materialGrid) {
            materialGrid.innerHTML = '';
            const materials = configData.materials;
            const currentConfig = component.getConfig ? component.getConfig() : {};

            Object.entries(materials).forEach(([key, mat]) => {
                const card = document.createElement('div');
                card.className = 'material-card';
                card.style.background = materialColors[key] || mat.color;
                card.textContent = mat.name;

                if (currentConfig.material === key) {
                    card.classList.add('active');
                }

                card.addEventListener('click', () => {
                    component.applyMaterial(key);
                    materialGrid.querySelectorAll('.material-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                });

                materialGrid.appendChild(card);
            });
        }

        // 渲染型号选项
        function renderModelOptions(component, modelButtons) {
            modelButtons.innerHTML = '';
            if (!component.getModelOptions) return;

            const options = component.getModelOptions();
            const currentConfig = component.getConfig();

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'model-btn';
                btn.textContent = opt.name;
                if (currentConfig.model === opt.key) btn.classList.add('active');

                btn.addEventListener('click', () => {
                    component.setModel(opt.key);
                    modelButtons.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
                modelButtons.appendChild(btn);
            });
        }

        // 渲染按钮型号选项
        function renderButtonModelOptions(component, buttonModelButtons) {
            buttonModelButtons.innerHTML = '';
            if (!component.getButtonModelOptions) return;

            const options = component.getButtonModelOptions();
            const currentConfig = component.getConfig();

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'model-btn';
                btn.textContent = opt.name;
                if (currentConfig.buttonModel === opt.key) btn.classList.add('active');

                btn.addEventListener('click', () => {
                    component.setButtonModel(opt.key);
                    buttonModelButtons.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
                buttonModelButtons.appendChild(btn);
            });
        }

        // 渲染显示器型号选项
        function renderDisplayModelOptions(component, displayModelButtons) {
            displayModelButtons.innerHTML = '';
            if (!component.getDisplayModelOptions) return;

            const options = component.getDisplayModelOptions();
            const currentConfig = component.getConfig();

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'model-btn';
                btn.textContent = opt.name;
                if (currentConfig.displayModel === opt.key) btn.classList.add('active');

                btn.addEventListener('click', () => {
                    component.setDisplayModel(opt.key);
                    displayModelButtons.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
                displayModelButtons.appendChild(btn);
            });
        }

        // 视图切换
        document.querySelectorAll('.view-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const view = btn.dataset.view;
                if (view === currentView) return;

                currentView = view;

                // 更新按钮状态
                document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                // 切换视图
                document.querySelectorAll('.view-container').forEach(v => v.classList.remove('active'));
                document.getElementById(`${view}-view`).classList.add('active');

                // 触发resize
                if (view === 'door' && doorConfigurator) {
                    doorConfigurator._onResize();
                } else if (view === 'cabin' && cabinConfigurator) {
                    cabinConfigurator._onResize();
                }
            });
        });

        // 初始化
        await initDoorConfigurator();
        await initCabinConfigurator();
    </script>
</body>
</html>
